name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        working-directory: src
        env:
          DJANGO_SETTINGS_MODULE: core.settings_ci
        run: uv run python manage.py test helseid --verbosity=2

      - name: Build package
        run: uv build
