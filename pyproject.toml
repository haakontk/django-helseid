[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "django-helseid"
version = "0.1.0"
description = "A Django app for HelseID authentication."
readme = "README.md"
requires-python = ">=3.14"
license = {text = "MIT"}
classifiers = [
    "Framework :: Django",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "django>=6.0",
    "requests>=2.32.5",
    "requests-oauth2client>=1.8.0",
]

[tool.setuptools]
package-dir = {"" = "django-helseid"}
packages = ["helseid"]

[tool.setuptools.package-data]
helseid = ["templates/**/*.html", "static/**/*"]
